# .github/workflows/sync-labels.yml
name: Sync Labels

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN needs `issues: write` to manage labels (labels live under the
# issues API). Without this, the action 403s with "Resource not accessible by
# integration" on orgs whose default token permissions are read-only.
# `contents: read` must be set explicitly too — declaring any permissions block
# drops every unlisted scope to `none`, which would break actions/checkout.
permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EndBug/label-sync@v2
        with:
          config-file: |
            https://raw.githubusercontent.com/EIT-GBI/.github/main/labels.yml
          delete-other-labels: false  # set true if you want strict enforcement
