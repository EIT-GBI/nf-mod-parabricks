name: build

on:
  push:
    branches: [main]
    paths: ['Dockerfile', '.github/workflows/build.yml']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  gate:
    # The template repo itself doesn't build; only its scaffolded copies.
    if: github.event.repository.name != 'nf-mod-template'
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        # The Dockerfile ships with a "TODO: pin the version" line.
        # Once the user removes that line, the build is considered ready.
        run: |
          if grep -q '# TODO: pin the version' Dockerfile; then
            echo "Dockerfile still has the stub TODO — skipping build."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: gate
    if: needs.gate.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
